<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FDF2F8"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#831843">SKT 데이터 기반 정밀 타겟팅</text>
  <rect x="290" y="62" width="220" height="3" fill="#DB2777"/>

  <!-- Data Source -->
  <rect x="40" y="90" width="200" height="160" fill="#DB2777" rx="6"/>
  <text x="140" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="0.1em">DATA SOURCE</text>
  <text x="140" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#fff">1,700만</text>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)">SKT 광고수신동의 고객</text>
  <text x="140" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">실시간 행동 데이터 기반</text>
  <text x="140" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">추정 아닌 실제 데이터</text>

  <!-- Arrows -->
  <path d="M245 170 L275 170" stroke="#DB2777" stroke-width="2"/>
  <polygon points="275,165 285,170 275,175" fill="#DB2777"/>

  <!-- Filter Dimensions -->
  <rect x="290" y="90" width="220" height="160" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="290" y="90" width="220" height="6" fill="#DB2777"/>
  <text x="400" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#831843">다차원 필터링</text>
  <line x1="320" y1="132" x2="480" y2="132" stroke="#FBCFE8" stroke-width="1"/>

  <rect x="310" y="144" width="180" height="22" fill="#FDF2F8" rx="3"/>
  <text x="320" y="159" font-family="system-ui, sans-serif" font-size="11" fill="#DB2777" font-weight="600">연령</text>
  <text x="480" y="159" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">20대 · 30대 · 40대 ...</text>

  <rect x="310" y="170" width="180" height="22" fill="#FDF2F8" rx="3"/>
  <text x="320" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#DB2777" font-weight="600">성별</text>
  <text x="480" y="185" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">남성 · 여성</text>

  <rect x="310" y="196" width="180" height="22" fill="#FDF2F8" rx="3"/>
  <text x="320" y="211" font-family="system-ui, sans-serif" font-size="11" fill="#DB2777" font-weight="600">지역</text>
  <text x="480" y="211" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">시/구/동 단위</text>

  <rect x="310" y="222" width="180" height="22" fill="#FDF2F8" rx="3"/>
  <text x="320" y="237" font-family="system-ui, sans-serif" font-size="11" fill="#DB2777" font-weight="600">관심사</text>
  <text x="480" y="237" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">앱/통화 데이터</text>

  <!-- Arrow -->
  <path d="M515 170 L545 170" stroke="#DB2777" stroke-width="2"/>
  <polygon points="545,165 555,170 545,175" fill="#DB2777"/>

  <!-- Result Target -->
  <rect x="560" y="90" width="200" height="160" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="560" y="90" width="200" height="6" fill="#BE185D"/>
  <text x="660" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#831843">정밀 타겟</text>
  <line x1="590" y1="132" x2="730" y2="132" stroke="#FBCFE8" stroke-width="1"/>

  <!-- Target example -->
  <rect x="580" y="144" width="160" height="90" fill="#FDF2F8" rx="6"/>
  <text x="660" y="167" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#DB2777" letter-spacing="0.05em">EXAMPLE TARGET</text>
  <text x="660" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">강남 거주, 30대 여성</text>
  <text x="660" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">최근 뷰티 앱 사용</text>
  <text x="660" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">주말 외식 빈도 높음</text>

  <!-- Bottom Industry Cards -->
  <rect x="40" y="280" width="720" height="3" fill="#FBCFE8"/>

  <text x="400" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#831843">활용 가능 업종</text>

  <rect x="40" y="332" width="110" height="150" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <rect x="40" y="332" width="110" height="4" fill="#EC4899"/>
  <text x="95" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#DB2777">F&amp;B</text>
  <text x="95" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">외식/카페</text>
  <text x="95" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">신규 오픈 홍보</text>

  <rect x="160" y="332" width="110" height="150" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <rect x="160" y="332" width="110" height="4" fill="#DB2777"/>
  <text x="215" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#DB2777">Beauty</text>
  <text x="215" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">뷰티/미용</text>
  <text x="215" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">시즌 프로모션</text>

  <rect x="280" y="332" width="110" height="150" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <rect x="280" y="332" width="110" height="4" fill="#BE185D"/>
  <text x="335" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#BE185D">Medical</text>
  <text x="335" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">병원/의료</text>
  <text x="335" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">지역 밀착 마케팅</text>

  <rect x="400" y="332" width="110" height="150" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <rect x="400" y="332" width="110" height="4" fill="#9D174D"/>
  <text x="455" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#9D174D">Edu</text>
  <text x="455" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">학원/교육</text>
  <text x="455" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">학부모 타겟팅</text>

  <rect x="520" y="332" width="110" height="150" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <rect x="520" y="332" width="110" height="4" fill="#831843"/>
  <text x="575" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#831843">Realty</text>
  <text x="575" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">부동산</text>
  <text x="575" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">아파트 분양</text>

  <rect x="640" y="332" width="120" height="150" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <rect x="640" y="332" width="120" height="4" fill="#DB2777"/>
  <text x="700" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#DB2777">Auto</text>
  <text x="700" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">자동차</text>
  <text x="700" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">시승 이벤트</text>
</svg>
