<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#EFF6FF"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1E3A5F">4단계 캠페인 프로세스</text>
  <rect x="310" y="62" width="180" height="3" fill="#2563EB"/>

  <!-- Step 1 -->
  <rect x="30" y="90" width="170" height="280" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="30" y="90" width="170" height="6" fill="#2563EB"/>
  <rect x="91" y="110" width="48" height="48" fill="#2563EB" opacity="0.12"/>
  <text x="115" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#2563EB">STEP</text>
  <text x="115" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#2563EB">01</text>
  <text x="115" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">타겟 설정</text>
  <line x1="55" y1="190" x2="175" y2="190" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="50" y="204" width="6" height="6" fill="#2563EB"/>
  <text x="66" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">연령·성별 설정</text>
  <rect x="50" y="228" width="6" height="6" fill="#2563EB"/>
  <text x="66" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">지역 범위 설정</text>
  <rect x="50" y="252" width="6" height="6" fill="#2563EB"/>
  <text x="66" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">관심사 필터</text>
  <rect x="50" y="276" width="6" height="6" fill="#2563EB"/>
  <text x="66" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">앱 사용 패턴</text>
  <rect x="50" y="300" width="6" height="6" fill="#2563EB"/>
  <text x="66" y="308" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">소비 행동 분석</text>
  <rect x="50" y="330" width="130" height="24" fill="#EFF6FF" rx="4"/>
  <text x="115" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#2563EB">정밀 타겟 확정</text>

  <!-- Arrow -->
  <path d="M205 230 L220 230" stroke="#2563EB" stroke-width="2"/>
  <polygon points="220,225 230,230 220,235" fill="#2563EB"/>

  <!-- Step 2 -->
  <rect x="235" y="90" width="170" height="280" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="235" y="90" width="170" height="6" fill="#1D4ED8"/>
  <rect x="296" y="110" width="48" height="48" fill="#1D4ED8" opacity="0.12"/>
  <text x="320" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1D4ED8">STEP</text>
  <text x="320" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#1D4ED8">02</text>
  <text x="320" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">콘텐츠 검수</text>
  <line x1="260" y1="190" x2="380" y2="190" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="255" y="204" width="6" height="6" fill="#1D4ED8"/>
  <text x="271" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">메시지 제작</text>
  <rect x="255" y="228" width="6" height="6" fill="#1D4ED8"/>
  <text x="271" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">이미지/영상 삽입</text>
  <rect x="255" y="252" width="6" height="6" fill="#1D4ED8"/>
  <text x="271" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">CTA 버튼 설정</text>
  <rect x="255" y="276" width="6" height="6" fill="#1D4ED8"/>
  <text x="271" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">심의 기준 확인</text>
  <rect x="255" y="300" width="6" height="6" fill="#1D4ED8"/>
  <text x="271" y="308" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">최종 검수 완료</text>
  <rect x="255" y="330" width="130" height="24" fill="#EFF6FF" rx="4"/>
  <text x="320" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8">콘텐츠 확정</text>

  <!-- Arrow -->
  <path d="M410 230 L425 230" stroke="#1D4ED8" stroke-width="2"/>
  <polygon points="425,225 435,230 425,235" fill="#1D4ED8"/>

  <!-- Step 3 -->
  <rect x="440" y="90" width="150" height="280" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="440" y="90" width="150" height="6" fill="#1E40AF"/>
  <rect x="491" y="110" width="48" height="48" fill="#1E40AF" opacity="0.12"/>
  <text x="515" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1E40AF">STEP</text>
  <text x="515" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#1E40AF">03</text>
  <text x="515" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">발송</text>
  <line x1="465" y1="190" x2="565" y2="190" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="460" y="204" width="6" height="6" fill="#1E40AF"/>
  <text x="476" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">최적 시간대</text>
  <rect x="460" y="228" width="6" height="6" fill="#1E40AF"/>
  <text x="476" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">요일별 전략</text>
  <rect x="460" y="252" width="6" height="6" fill="#1E40AF"/>
  <text x="476" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">대량 발송</text>
  <rect x="460" y="276" width="6" height="6" fill="#1E40AF"/>
  <text x="476" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">수신율 극대화</text>
  <rect x="460" y="330" width="110" height="24" fill="#EFF6FF" rx="4"/>
  <text x="515" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E40AF">발송 완료</text>

  <!-- Arrow -->
  <path d="M595 230 L610 230" stroke="#1E40AF" stroke-width="2"/>
  <polygon points="610,225 620,230 610,235" fill="#1E40AF"/>

  <!-- Step 4 -->
  <rect x="625" y="90" width="140" height="280" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="625" y="90" width="140" height="6" fill="#1E3A8A"/>
  <rect x="671" y="110" width="48" height="48" fill="#1E3A8A" opacity="0.12"/>
  <text x="695" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1E3A8A">STEP</text>
  <text x="695" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#1E3A8A">04</text>
  <text x="695" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A5F">결과 리포트</text>
  <line x1="645" y1="190" x2="745" y2="190" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="645" y="204" width="6" height="6" fill="#1E3A8A"/>
  <text x="661" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">수신율 분석</text>
  <rect x="645" y="228" width="6" height="6" fill="#1E3A8A"/>
  <text x="661" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">클릭률 추적</text>
  <rect x="645" y="252" width="6" height="6" fill="#1E3A8A"/>
  <text x="661" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">전환율 측정</text>
  <rect x="645" y="276" width="6" height="6" fill="#1E3A8A"/>
  <text x="661" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">인사이트 도출</text>
  <rect x="645" y="330" width="100" height="24" fill="#EFF6FF" rx="4"/>
  <text x="695" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E3A8A">성과 분석</text>

  <!-- Bottom -->
  <rect x="40" y="400" width="720" height="3" fill="#BFDBFE"/>
  <text x="400" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E3A5F">타겟 설정 → 콘텐츠 검수 → 최적 발송 → 성과 분석의 체계적 4단계 프로세스</text>
  <text x="400" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">업종·상권·시간대별 최적화된 캠페인으로 전환율 극대화</text>
</svg>
