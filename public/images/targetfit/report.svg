<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#ECFDF5"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#064E3B">캠페인 성과 분석 퍼널</text>
  <rect x="310" y="62" width="180" height="3" fill="#059669"/>

  <!-- Funnel Chart -->
  <rect x="100" y="95" width="600" height="60" fill="#059669" rx="4"/>
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">발송</text>
  <text x="660" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">100%</text>

  <rect x="140" y="163" width="520" height="60" fill="#047857" rx="4"/>
  <text x="400" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">수신</text>
  <text x="620" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">92%</text>

  <rect x="180" y="231" width="440" height="60" fill="#065F46" rx="4"/>
  <text x="400" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">열람</text>
  <text x="580" y="261" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">68%</text>

  <rect x="220" y="299" width="360" height="60" fill="#064E3B" rx="4"/>
  <text x="400" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">클릭</text>
  <text x="540" y="329" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">35%</text>

  <rect x="260" y="367" width="280" height="60" fill="#022C22" rx="4"/>
  <text x="400" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">전환</text>
  <text x="500" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="rgba(255,255,255,0.9)">12%</text>

  <!-- Right Side KPIs -->
  <rect x="580" y="335" width="180" height="145" fill="#fff" stroke="#A7F3D0" stroke-width="1.5"/>
  <rect x="580" y="335" width="180" height="5" fill="#059669"/>
  <text x="670" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#059669" letter-spacing="0.1em">KEY METRICS</text>

  <text x="600" y="395" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">수신율</text>
  <text x="740" y="395" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#059669">92%</text>

  <text x="600" y="418" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">열람률</text>
  <text x="740" y="418" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#047857">68%</text>

  <text x="600" y="441" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">클릭률</text>
  <text x="740" y="441" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#065F46">35%</text>

  <text x="600" y="464" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">전환율</text>
  <text x="740" y="464" text-anchor="end" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#064E3B">12%</text>

  <!-- Left annotation -->
  <rect x="40" y="335" width="180" height="145" fill="#fff" stroke="#A7F3D0" stroke-width="1.5"/>
  <rect x="40" y="335" width="180" height="5" fill="#059669"/>
  <text x="130" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#059669" letter-spacing="0.1em">ROI 분석</text>

  <text x="130" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#064E3B">ROI</text>
  <text x="130" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#059669" font-weight="700">투자 대비 수익률</text>
  <text x="130" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">명확한 성과 산출</text>
  <text x="130" y="466" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">데이터 기반 개선</text>
</svg>
