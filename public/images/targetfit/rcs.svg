<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FAF5FF"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#581C87">SMS vs RCS 메시지 비교</text>
  <rect x="310" y="62" width="180" height="3" fill="#9333EA"/>

  <!-- SMS Card -->
  <rect x="60" y="90" width="300" height="300" fill="#fff" stroke="#E9D5FF" stroke-width="1.5"/>
  <rect x="60" y="90" width="300" height="40" fill="#E5E7EB"/>
  <text x="210" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6B7280">기존 SMS / LMS</text>

  <rect x="90" y="150" width="240" height="100" fill="#F3F4F6" rx="8"/>
  <text x="210" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">[광고] OO매장</text>
  <text x="210" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">오픈 기념 20% 할인...</text>
  <text x="210" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9CA3AF">무료거부 080-XXX</text>
  <text x="210" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D1D5DB">텍스트만 가능</text>

  <rect x="90" y="270" width="240" height="28" fill="#F3F4F6" rx="4"/>
  <text x="100" y="289" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">40자 제한</text>
  <text x="320" y="289" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#DC2626" font-weight="600">X</text>

  <rect x="90" y="302" width="240" height="28" fill="#F3F4F6" rx="4"/>
  <text x="100" y="321" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">이미지/영상</text>
  <text x="320" y="321" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#DC2626" font-weight="600">X</text>

  <rect x="90" y="334" width="240" height="28" fill="#F3F4F6" rx="4"/>
  <text x="100" y="353" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">버튼/링크</text>
  <text x="320" y="353" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#DC2626" font-weight="600">X</text>

  <!-- VS -->
  <text x="400" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#9333EA">VS</text>

  <!-- RCS Card -->
  <rect x="440" y="90" width="300" height="300" fill="#fff" stroke="#C084FC" stroke-width="2"/>
  <rect x="440" y="90" width="300" height="40" fill="#9333EA"/>
  <text x="590" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fff">RCS 메시지</text>

  <rect x="470" y="150" width="240" height="100" fill="#FAF5FF" rx="8" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="480" y="160" width="80" height="60" fill="#E9D5FF" rx="4"/>
  <text x="520" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7C3AED">IMAGE</text>
  <text x="620" y="180" font-family="system-ui, sans-serif" font-size="12" fill="#581C87" font-weight="600">OO매장 GRAND OPEN</text>
  <text x="620" y="198" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">지금 방문하면 20% 할인</text>
  <rect x="570" y="210" width="80" height="24" fill="#9333EA" rx="4"/>
  <text x="610" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">예약하기</text>
  <rect x="656" y="210" width="46" height="24" fill="#E9D5FF" rx="4"/>
  <text x="679" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#7C3AED">전화</text>

  <rect x="470" y="270" width="240" height="28" fill="#F5F3FF" rx="4"/>
  <text x="480" y="289" font-family="system-ui, sans-serif" font-size="11" fill="#581C87">무제한 콘텐츠</text>
  <text x="700" y="289" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#059669" font-weight="600">O</text>

  <rect x="470" y="302" width="240" height="28" fill="#F5F3FF" rx="4"/>
  <text x="480" y="321" font-family="system-ui, sans-serif" font-size="11" fill="#581C87">이미지/영상/슬라이드</text>
  <text x="700" y="321" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#059669" font-weight="600">O</text>

  <rect x="470" y="334" width="240" height="28" fill="#F5F3FF" rx="4"/>
  <text x="480" y="353" font-family="system-ui, sans-serif" font-size="11" fill="#581C87">CTA 버튼 (전화/예약/길찾기)</text>
  <text x="700" y="353" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#059669" font-weight="600">O</text>

  <!-- Bottom Performance -->
  <rect x="60" y="410" width="170" height="70" fill="#fff" stroke="#E9D5FF" stroke-width="1"/>
  <text x="145" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#9333EA">3~5x</text>
  <text x="145" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">SMS 대비 클릭률</text>

  <rect x="245" y="410" width="170" height="70" fill="#fff" stroke="#E9D5FF" stroke-width="1"/>
  <text x="330" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#7C3AED">2~3x</text>
  <text x="330" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">전환율 향상</text>

  <rect x="430" y="410" width="170" height="70" fill="#fff" stroke="#E9D5FF" stroke-width="1"/>
  <text x="515" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#6D28D9">250원~</text>
  <text x="515" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">건당 가격</text>

  <rect x="615" y="410" width="145" height="70" fill="#fff" stroke="#E9D5FF" stroke-width="1"/>
  <text x="688" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#581C87">2,000건~</text>
  <text x="688" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">최소 발송</text>
</svg>
