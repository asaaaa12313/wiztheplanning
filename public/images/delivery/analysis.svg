  <text x="495" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#D97706">4대</text>
  <text x="495" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">플랫폼 통합</text>
  <text x="495" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">배민·쿠팡·요기요·땡겨요</text>

  <rect x="595" y="360" width="170" height="120" fill="#fff" stroke="#FDBA74" stroke-width="1"/>
  <text x="680" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#B45309">24h</text>
  <text x="680" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">실시간 모니터링</text>
  <text x="680" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">주문·매출·리뷰</text>
