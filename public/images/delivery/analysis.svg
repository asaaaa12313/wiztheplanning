  <text x="480" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#D97706">요기요</text>
  <text x="480" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Yogiyo</text>
  <text x="480" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">광고 · 쿠폰</text>
  <rect x="420" y="185" width="120" height="14" fill="#FDBA74" opacity="0.3"/>
