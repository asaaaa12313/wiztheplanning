  <text x="300" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#C2410C">쿠팡이츠</text>
  <text x="300" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Coupang Eats</text>
  <text x="300" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">광고 · 프로모션</text>
