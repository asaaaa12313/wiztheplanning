  <rect x="600" y="185" width="56" height="14" fill="#B45309" opacity="0.7"/>

  <!-- Arrows to center -->
  <path d="M120 215 L400 260" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M300 215 L400 260" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M480 215 L400 260" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <path d="M670 215 L400 260" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Central Hub -->
  <rect x="280" y="245" width="240" height="60" fill="#EA580C" rx="6"/>
  <text x="400" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">통합 관리 대시보드</text>
  <text x="400" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">실시간 데이터 모니터링</text>

  <!-- Arrow down -->
  <path d="M400 310 L400 340" stroke="#EA580C" stroke-width="2"/>
  <polygon points="395,340 400,350 405,340" fill="#EA580C"/>

