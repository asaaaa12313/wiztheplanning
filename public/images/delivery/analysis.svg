  <text x="120" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#EA580C">배민</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">배달의민족</text>
