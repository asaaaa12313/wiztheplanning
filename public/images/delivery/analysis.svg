  <text x="670" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#B45309">땡겨요</text>
  <text x="670" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">신한은행 배달앱</text>
