  <text x="125" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">운영 노하우</text>
  <text x="125" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">전문 배달 마케팅</text>

  <rect x="225" y="360" width="170" height="120" fill="#fff" stroke="#FDBA74" stroke-width="1"/>
  <text x="310" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#C2410C">7,000+</text>
  <text x="310" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">매장 최적화</text>
  <text x="310" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">누적 관리 매장</text>

