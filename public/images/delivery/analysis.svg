  <rect x="60" y="185" width="120" height="14" fill="#FDBA74" opacity="0.3"/>
  <rect x="60" y="185" width="96" height="14" fill="#EA580C" opacity="0.7"/>

  <rect x="220" y="90" width="160" height="120" fill="#fff" stroke="#FDBA74" stroke-width="1.5"/>
