<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FFFBEB"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#78350F">디자인 제작 서비스</text>
  <rect x="290" y="62" width="220" height="3" fill="#F59E0B"/>

  <!-- Design Category Grid -->
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#78350F">제작 가능 카테고리</text>

  <!-- Row 1 -->
  <rect x="40" y="118" width="170" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="40" y="118" width="170" height="5" fill="#F59E0B"/>
  <rect x="100" y="132" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="125" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#F59E0B">MENU</text>
  <text x="125" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">메뉴판</text>
  <text x="125" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">테이블/벽면/접이식</text>

  <rect x="225" y="118" width="170" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="225" y="118" width="170" height="5" fill="#EAB308"/>
  <rect x="285" y="132" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="310" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#EAB308">FLYER</text>
  <text x="310" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">전단지</text>
  <text x="310" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">A4/A5/DM 발송용</text>

  <rect x="410" y="118" width="170" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="410" y="118" width="170" height="5" fill="#D97706"/>
  <rect x="470" y="132" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="495" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#D97706">BANNER</text>
  <text x="495" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">배너</text>
  <text x="495" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">현수막/실내외 배너</text>

  <rect x="595" y="118" width="165" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="595" y="118" width="165" height="5" fill="#B45309"/>
  <rect x="652" y="132" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="677" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#B45309">CARD</text>
  <text x="677" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">명함</text>
  <text x="677" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">양면/단면/고급지</text>

  <!-- Row 2 -->
  <rect x="40" y="240" width="170" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="40" y="240" width="170" height="5" fill="#F59E0B"/>
  <rect x="100" y="254" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="125" y="279" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#F59E0B">SNS</text>
  <text x="125" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">SNS 콘텐츠</text>
  <text x="125" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">카드뉴스/피드/스토리</text>

  <rect x="225" y="240" width="170" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="225" y="240" width="170" height="5" fill="#EAB308"/>
  <rect x="285" y="254" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="310" y="279" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#EAB308">LOGO</text>
  <text x="310" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">로고 디자인</text>
  <text x="310" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">CI/BI/심볼</text>

  <rect x="410" y="240" width="170" height="110" fill="#fff" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="410" y="240" width="170" height="5" fill="#D97706"/>
  <rect x="470" y="254" width="50" height="40" fill="#FEF3C7" rx="4"/>
  <text x="495" y="279" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#D97706">SIGN</text>
  <text x="495" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350F">간판 디자인</text>
  <text x="495" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">외부간판/실내사인</text>

  <rect x="595" y="240" width="165" height="110" fill="#F59E0B" rx="6"/>
  <text x="677" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="0.1em">TOTAL</text>
  <text x="677" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#fff">20+</text>
  <text x="677" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">제작물 종류</text>

  <!-- Process -->
  <rect x="40" y="370" width="720" height="3" fill="#FDE68A"/>
  <text x="400" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#78350F">제작 프로세스</text>

  <rect x="40" y="414" width="170" height="70" fill="#fff" stroke="#FDE68A" stroke-width="1"/>
  <text x="125" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#F59E0B" letter-spacing="0.05em">STEP 01</text>
  <text x="125" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#78350F">요구사항 접수</text>

  <path d="M215 449 L230 449" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="230,444 240,449 230,454" fill="#F59E0B"/>

  <rect x="245" y="414" width="140" height="70" fill="#fff" stroke="#FDE68A" stroke-width="1"/>
  <text x="315" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#EAB308" letter-spacing="0.05em">STEP 02</text>
  <text x="315" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#78350F">시안 제작</text>

  <path d="M390 449 L405 449" stroke="#EAB308" stroke-width="2"/>
  <polygon points="405,444 415,449 405,454" fill="#EAB308"/>

  <rect x="420" y="414" width="140" height="70" fill="#fff" stroke="#FDE68A" stroke-width="1"/>
  <text x="490" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#D97706" letter-spacing="0.05em">STEP 03</text>
  <text x="490" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#78350F">피드백 반영</text>

  <path d="M565 449 L580 449" stroke="#D97706" stroke-width="2"/>
  <polygon points="580,444 590,449 580,454" fill="#D97706"/>

  <rect x="595" y="414" width="165" height="70" fill="#F59E0B" rx="4"/>
  <text x="677" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.8)" letter-spacing="0.05em">STEP 04</text>
  <text x="677" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff">최종 납품</text>
</svg>