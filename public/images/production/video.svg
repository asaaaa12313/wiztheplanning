  <rect x="40" y="330" width="720" height="3" fill="#BAE6FD"/>
  <text x="400" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0C4A6E">숏폼 플랫폼 최적화</text>

  <rect x="40" y="380" width="140" height="100" fill="#fff" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="40" y="380" width="140" height="4" fill="#E1306C"/>
  <text x="110" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#E1306C">Reels</text>
  <text x="110" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">인스타그램 릴스</text>
  <text x="110" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">9:16 세로형</text>

  <rect x="200" y="380" width="140" height="100" fill="#fff" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="200" y="380" width="140" height="4" fill="#FF0000"/>
  <text x="270" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#FF0000">Shorts</text>
  <text x="270" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">유튜브 쇼츠</text>
  <text x="270" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">60초 이내</text>

  <rect x="360" y="380" width="140" height="100" fill="#fff" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="360" y="380" width="140" height="4" fill="#000000"/>
  <text x="430" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#111827">TikTok</text>
  <text x="430" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">틱톡 영상</text>
  <text x="430" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">트렌드 반영</text>

  <rect x="520" y="380" width="140" height="100" fill="#fff" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="520" y="380" width="140" height="4" fill="#0EA5E9"/>
  <text x="590" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#0EA5E9">Brand</text>
  <text x="590" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">브랜드 영상</text>
  <text x="590" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">16:9 가로형</text>

  <rect x="680" y="380" width="80" height="100" fill="#0EA5E9" rx="6"/>
  <text x="720" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#fff">5+</text>
  <text x="720" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)">편 제작</text>
  <text x="720" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">패키지</text>
</svg>