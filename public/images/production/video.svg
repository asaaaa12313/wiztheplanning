<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#F0F9FF"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#0C4A6E">영상 촬영 · 숏폼 제작</text>
  <rect x="290" y="62" width="220" height="3" fill="#0EA5E9"/>

  <!-- Step 1: 기획 -->
  <rect x="40" y="90" width="220" height="220" fill="#fff" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="40" y="90" width="220" height="6" fill="#0EA5E9"/>
  <rect x="126" y="108" width="48" height="48" fill="#0EA5E9" opacity="0.12"/>
  <text x="150" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#0EA5E9">STEP</text>
  <text x="150" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#0EA5E9">01</text>
  <text x="150" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0C4A6E">기획 · 콘티</text>
  <line x1="70" y1="188" x2="230" y2="188" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="60" y="200" width="6" height="6" fill="#0EA5E9"/>
  <text x="76" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">촬영 목적/방향 설정</text>
  <rect x="60" y="222" width="6" height="6" fill="#0EA5E9"/>
  <text x="76" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">콘티/스토리보드 제작</text>
  <rect x="60" y="244" width="6" height="6" fill="#0EA5E9"/>
  <text x="76" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">촬영 일정 확정</text>
  <rect x="60" y="266" width="6" height="6" fill="#0EA5E9"/>
  <text x="76" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">장비/인력 배치</text>

  <!-- Arrow -->
  <path d="M265 200 L285 200" stroke="#0EA5E9" stroke-width="2"/>
  <polygon points="285,195 295,200 285,205" fill="#0EA5E9"/>

  <!-- Step 2: 촬영 -->
  <rect x="300" y="90" width="200" height="220" fill="#fff" stroke="#BAE6FD" stroke-width="1.5"/>
  <rect x="300" y="90" width="200" height="6" fill="#0284C7"/>
  <rect x="376" y="108" width="48" height="48" fill="#0284C7" opacity="0.12"/>
  <text x="400" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#0284C7">STEP</text>
  <text x="400" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#0284C7">02</text>
  <text x="400" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0C4A6E">현장 촬영</text>
  <line x1="330" y1="188" x2="470" y2="188" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="320" y="200" width="6" height="6" fill="#0284C7"/>
  <text x="336" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">감독 현장 디렉팅</text>
  <rect x="320" y="222" width="6" height="6" fill="#0284C7"/>
  <text x="336" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">멀티 앵글 촬영</text>
  <rect x="320" y="244" width="6" height="6" fill="#0284C7"/>
  <text x="336" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">드론/짐벌 활용</text>
  <rect x="320" y="266" width="6" height="6" fill="#0284C7"/>
  <text x="336" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">현장 모니터링</text>

  <!-- Arrow -->
  <path d="M505 200 L525 200" stroke="#0284C7" stroke-width="2"/>
  <polygon points="525,195 535,200 525,205" fill="#0284C7"/>

  <!-- Step 3: 편집 -->
  <rect x="540" y="90" width="220" height="220" fill="#fff" stroke="#BAE6FD" stroke-width="1.5"/>
