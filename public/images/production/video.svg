  <rect x="626" y="108" width="48" height="48" fill="#0369A1" opacity="0.12"/>
  <text x="650" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#0369A1">STEP</text>
  <text x="650" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#0369A1">03</text>
  <text x="650" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0C4A6E">편집 · 납품</text>
  <line x1="570" y1="188" x2="730" y2="188" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="560" y="200" width="6" height="6" fill="#0369A1"/>
  <text x="576" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">컷 편집/색보정</text>
  <rect x="560" y="222" width="6" height="6" fill="#0369A1"/>
  <text x="576" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">자막/효과 삽입</text>
  <rect x="560" y="244" width="6" height="6" fill="#0369A1"/>
  <text x="576" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">BGM/사운드 믹싱</text>
  <rect x="560" y="266" width="6" height="6" fill="#0369A1"/>
  <text x="576" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">플랫폼별 포맷 변환</text>

