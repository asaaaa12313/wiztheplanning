<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FFF1F2"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#881337">AI 인스타그램 자동화 플로우</text>
  <rect x="340" y="58" width="120" height="3" fill="#E11D48"/>

  <!-- Center Flow Diagram -->
  <!-- Step 1: 브랜드 학습 -->
  <rect x="60" y="90" width="160" height="180" fill="#fff" stroke="#FECDD3" stroke-width="1.5"/>
  <rect x="60" y="90" width="160" height="5" fill="#E11D48"/>
  <circle cx="140" cy="130" r="22" fill="#E11D48" opacity="0.1"/>
  <text x="140" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#E11D48">AI</text>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#881337">브랜드 학습</text>
  <line x1="85" y1="184" x2="195" y2="184" stroke="#FECDD3" stroke-width="1"/>
  <rect x="80" y="198" width="5" height="5" fill="#E11D48"/>
  <text x="94" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">톤앤매너 분석</text>
  <rect x="80" y="218" width="5" height="5" fill="#E11D48"/>
  <text x="94" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">비주얼 스타일 학습</text>
  <rect x="80" y="238" width="5" height="5" fill="#E11D48"/>
  <text x="94" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">타깃 고객 파악</text>

  <!-- Arrow -->
  <path d="M225 180 L245 180" stroke="#E11D48" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="245,175 255,180 245,185" fill="#E11D48"/>

  <!-- Step 2: 콘텐츠 생성 -->
  <rect x="260" y="90" width="160" height="180" fill="#fff" stroke="#FECDD3" stroke-width="1.5"/>
  <rect x="260" y="90" width="160" height="5" fill="#BE123C"/>
  <circle cx="340" cy="130" r="22" fill="#BE123C" opacity="0.1"/>
  <text x="340" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#BE123C">생성</text>
  <text x="340" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#881337">콘텐츠 생성</text>
  <line x1="285" y1="184" x2="395" y2="184" stroke="#FECDD3" stroke-width="1"/>
  <rect x="280" y="198" width="5" height="5" fill="#BE123C"/>
  <text x="294" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">AI 이미지 생성</text>
  <rect x="280" y="218" width="5" height="5" fill="#BE123C"/>
  <text x="294" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">캡션 자동 작성</text>
  <rect x="280" y="238" width="5" height="5" fill="#BE123C"/>
  <text x="294" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">해시태그 최적화</text>

  <!-- Arrow -->
  <path d="M425 180 L445 180" stroke="#BE123C" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="445,175 455,180 445,185" fill="#BE123C"/>

  <!-- Step 3: 자동 업로드 -->
  <rect x="460" y="90" width="160" height="180" fill="#fff" stroke="#FECDD3" stroke-width="1.5"/>
  <rect x="460" y="90" width="160" height="5" fill="#9F1239"/>
  <circle cx="540" cy="130" r="22" fill="#9F1239" opacity="0.1"/>
  <text x="540" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#9F1239">자동</text>
  <text x="540" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#881337">자동 업로드</text>
  <line x1="485" y1="184" x2="595" y2="184" stroke="#FECDD3" stroke-width="1"/>
  <rect x="480" y="198" width="5" height="5" fill="#9F1239"/>
  <text x="494" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">최적 시간 게시</text>
  <rect x="480" y="218" width="5" height="5" fill="#9F1239"/>
  <text x="494" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">피드·릴스·스토리</text>
  <rect x="480" y="238" width="5" height="5" fill="#9F1239"/>
  <text x="494" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">스케줄링 관리</text>

  <!-- Arrow -->
  <path d="M625 180 L645 180" stroke="#9F1239" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="645,175 655,180 645,185" fill="#9F1239"/>

  <!-- Step 4: 성과 -->
  <rect x="660" y="90" width="105" height="180" fill="#fff" stroke="#FECDD3" stroke-width="1.5"/>
  <rect x="660" y="90" width="105" height="5" fill="#881337"/>
  <circle cx="713" cy="130" r="22" fill="#881337" opacity="0.1"/>
  <text x="713" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#881337">↑</text>
  <text x="713" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#881337">성과</text>
  <line x1="675" y1="184" x2="750" y2="184" stroke="#FECDD3" stroke-width="1"/>
  <rect x="672" y="198" width="5" height="5" fill="#881337"/>
  <text x="686" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">팔로워 증가</text>
  <rect x="672" y="218" width="5" height="5" fill="#881337"/>
  <text x="686" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">DM 문의 증가</text>
  <rect x="672" y="238" width="5" height="5" fill="#881337"/>
  <text x="686" y="245" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">매출 전환</text>

  <!-- Bottom: 채널별 콘텐츠 타입 -->
  <text x="400" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#881337">지원 콘텐츠 타입</text>
  <line x1="320" y1="320" x2="480" y2="320" stroke="#FECDD3" stroke-width="1"/>

  <rect x="60" y="340" width="160" height="130" fill="#fff" stroke="#FECDD3" stroke-width="1"/>
  <rect x="108" y="358" width="64" height="28" fill="#E11D48" opacity="0.1"/>
  <text x="140" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#E11D48">피드</text>
  <text x="140" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">정방형 이미지</text>
  <text x="140" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">캐러셀 콘텐츠</text>
  <text x="140" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">1080 × 1080px</text>

  <rect x="240" y="340" width="160" height="130" fill="#fff" stroke="#FECDD3" stroke-width="1"/>
  <rect x="288" y="358" width="64" height="28" fill="#BE123C" opacity="0.1"/>
  <text x="320" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#BE123C">릴스</text>
  <text x="320" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">숏폼 영상형</text>
  <text x="320" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">트렌드 콘텐츠</text>
  <text x="320" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">1080 × 1920px</text>

  <rect x="420" y="340" width="160" height="130" fill="#fff" stroke="#FECDD3" stroke-width="1"/>
  <rect x="468" y="358" width="64" height="28" fill="#9F1239" opacity="0.1"/>
  <text x="500" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#9F1239">스토리</text>
  <text x="500" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">일상·이벤트</text>
  <text x="500" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">실시간 소통</text>
  <text x="500" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">1080 × 1920px</text>

  <rect x="600" y="340" width="165" height="130" fill="#fff" stroke="#FECDD3" stroke-width="1"/>
  <rect x="651" y="358" width="64" height="28" fill="#881337" opacity="0.1"/>
  <text x="683" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#881337">당근</text>
  <text x="683" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">로컬 마케팅</text>
  <text x="683" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">동네 타겟팅</text>
  <text x="683" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">최적 사이즈 자동</text>
</svg>