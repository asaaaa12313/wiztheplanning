<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#831843">체험단 운영 프로세스</text>
  <line x1="320" y1="60" x2="480" y2="60" stroke="#EC4899" stroke-width="3"/>

  <!-- Process Flow - 5 steps in a horizontal flow -->
  <!-- Step 1: 모집 -->
  <rect x="30" y="90" width="136" height="190" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="30" y="90" width="136" height="5" rx="2.5" fill="#EC4899"/>
  <circle cx="98" cy="128" r="24" fill="#EC4899" opacity="0.1"/>
  <text x="98" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#EC4899">&#x1F4E2;</text>
  <text x="98" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#EC4899">STEP 1</text>
  <text x="98" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">체험단 모집</text>
  <text x="98" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">업종별 맞춤</text>
  <text x="98" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">인플루언서 매칭</text>
  <text x="98" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">월 500명+ 모집</text>
  <rect x="48" y="248" width="100" height="20" rx="10" fill="#EC4899" opacity="0.1"/>
  <text x="98" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">자동 매칭</text>

  <!-- Arrow -->
  <path d="M170 185 L192 185" stroke="#EC4899" stroke-width="2"/>
  <polygon points="192,180 202,185 192,190" fill="#EC4899"/>

  <!-- Step 2: 선정 -->
  <rect x="206" y="90" width="136" height="190" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="206" y="90" width="136" height="5" rx="2.5" fill="#DB2777"/>
  <circle cx="274" cy="128" r="24" fill="#DB2777" opacity="0.1"/>
  <text x="274" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#DB2777">&#x2705;</text>
  <text x="274" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#DB2777">STEP 2</text>
  <text x="274" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">선정 · 매칭</text>
  <text x="274" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">타깃 고객층 분석</text>
  <text x="274" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">채널별 적합도 평가</text>
  <text x="274" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">최적 인원 선정</text>
  <rect x="224" y="248" width="100" height="20" rx="10" fill="#DB2777" opacity="0.1"/>
  <text x="274" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#DB2777">AI 스코어링</text>

  <!-- Arrow -->
  <path d="M346 185 L368 185" stroke="#DB2777" stroke-width="2"/>
  <polygon points="368,180 378,185 368,190" fill="#DB2777"/>

  <!-- Step 3: 방문/체험 -->
  <rect x="382" y="90" width="136" height="190" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="382" y="90" width="136" height="5" rx="2.5" fill="#BE185D"/>
  <circle cx="450" cy="128" r="24" fill="#BE185D" opacity="0.1"/>
  <text x="450" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#BE185D">&#x1F3EA;</text>
  <text x="450" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#BE185D">STEP 3</text>
  <text x="450" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">방문 · 체험</text>
  <text x="450" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">방문 일정 조율</text>
  <text x="450" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">체험 가이드라인</text>
  <text x="450" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">현장 관리 지원</text>
  <rect x="400" y="248" width="100" height="20" rx="10" fill="#BE185D" opacity="0.1"/>
  <text x="450" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#BE185D">스케줄 관리</text>

  <!-- Arrow -->
  <path d="M522 185 L544 185" stroke="#BE185D" stroke-width="2"/>
  <polygon points="544,180 554,185 544,190" fill="#BE185D"/>

  <!-- Step 4: 리뷰 작성 -->
  <rect x="558" y="90" width="136" height="190" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="558" y="90" width="136" height="5" rx="2.5" fill="#9D174D"/>
  <circle cx="626" cy="128" r="24" fill="#9D174D" opacity="0.1"/>
  <text x="626" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#9D174D">&#x270D;</text>
  <text x="626" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#9D174D">STEP 4</text>
  <text x="626" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">리뷰 작성</text>
  <text x="626" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">품질 가이드 제공</text>
  <text x="626" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">SEO 키워드 반영</text>
  <text x="626" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">48시간 내 게시</text>
  <rect x="576" y="248" width="100" height="20" rx="10" fill="#9D174D" opacity="0.1"/>
  <text x="626" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#9D174D">품질 검수</text>

  <!-- Bottom: Results -->
  <rect x="40" y="310" width="720" height="4" rx="2" fill="#FBCFE8"/>

  <!-- Result Cards -->
  <rect x="40" y="332" width="170" height="150" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <text x="125" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#EC4899" letter-spacing="0.1em">블로그 체험단</text>
  <text x="125" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#831843">92%</text>
  <text x="125" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">리뷰 작성률</text>
  <rect x="65" y="440" width="120" height="6" rx="3" fill="#FCE7F3"/>
  <rect x="65" y="440" width="110" height="6" rx="3" fill="#EC4899"/>
  <text x="125" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">네이버 블로그 중심</text>

  <rect x="225" y="332" width="170" height="150" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <text x="310" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#DB2777" letter-spacing="0.1em">인스타 체험단</text>
  <text x="310" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#831843">3.5x</text>
  <text x="310" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">자연 유입 증가</text>
  <rect x="250" y="440" width="120" height="6" rx="3" fill="#FCE7F3"/>
  <rect x="250" y="440" width="105" height="6" rx="3" fill="#DB2777"/>
  <text x="310" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">피드 + 릴스 커버</text>

  <rect x="410" y="332" width="170" height="150" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <text x="495" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#BE185D" letter-spacing="0.1em">유튜브 체험단</text>
  <text x="495" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#831843">500+</text>
  <text x="495" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">월 체험단 모집</text>
  <rect x="435" y="440" width="120" height="6" rx="3" fill="#FCE7F3"/>
  <rect x="435" y="440" width="96" height="6" rx="3" fill="#BE185D"/>
  <text x="495" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">쇼츠 + 리뷰 영상</text>

  <rect x="595" y="332" width="170" height="150" rx="12" fill="#fff" stroke="#FBCFE8" stroke-width="1"/>
  <text x="680" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9D174D" letter-spacing="0.1em">통합 성과</text>
  <text x="680" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#831843">48h</text>
  <text x="680" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">리뷰 게시 평균</text>
  <rect x="620" y="440" width="120" height="6" rx="3" fill="#FCE7F3"/>
  <rect x="620" y="440" width="120" height="6" rx="3" fill="#9D174D"/>
  <text x="680" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">전 채널 통합 관리</text>
</svg>