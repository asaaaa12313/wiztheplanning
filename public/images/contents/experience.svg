<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#FDF2F8"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#831843">체험단 운영 프로세스</text>
  <rect x="320" y="58" width="160" height="3" fill="#EC4899"/>

  <!-- Step 1: 모집 -->
  <rect x="30" y="90" width="136" height="190" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="30" y="90" width="136" height="5" fill="#EC4899"/>
  <rect x="74" y="104" width="48" height="48" fill="#EC4899" opacity="0.1"/>
  <text x="98" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#EC4899">STEP</text>
  <text x="98" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#EC4899">01</text>
  <text x="98" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">체험단 모집</text>
  <text x="98" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">업종별 맞춤</text>
  <text x="98" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">인플루언서 매칭</text>
  <text x="98" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">월 500명+ 모집</text>
  <rect x="48" y="248" width="100" height="20" fill="#EC4899" opacity="0.1"/>
  <text x="98" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">자동 매칭</text>

  <!-- Arrow -->
  <path d="M170 185 L192 185" stroke="#EC4899" stroke-width="2"/>
  <polygon points="192,180 202,185 192,190" fill="#EC4899"/>

  <!-- Step 2: 선정 -->
  <rect x="206" y="90" width="136" height="190" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="206" y="90" width="136" height="5" fill="#DB2777"/>
  <rect x="250" y="104" width="48" height="48" fill="#DB2777" opacity="0.1"/>
  <text x="274" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#DB2777">STEP</text>
  <text x="274" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#DB2777">02</text>
  <text x="274" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">선정 / 매칭</text>
  <text x="274" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">타깃 고객층 분석</text>
  <text x="274" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">채널별 적합도 평가</text>
  <text x="274" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">최적 인원 선정</text>
