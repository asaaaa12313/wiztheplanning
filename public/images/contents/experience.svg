  <rect x="558" y="90" width="210" height="190" fill="#fff" stroke="#FBCFE8" stroke-width="1.5"/>
  <rect x="558" y="90" width="210" height="5" fill="#9D174D"/>
  <rect x="639" y="104" width="48" height="48" fill="#9D174D" opacity="0.1"/>
  <text x="663" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#9D174D">STEP</text>
  <text x="663" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#9D174D">04</text>
  <text x="663" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">리뷰 작성</text>
  <text x="663" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">품질 가이드 제공</text>
