  <text x="450" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">체험 가이드라인</text>
  <text x="450" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">현장 관리 지원</text>
