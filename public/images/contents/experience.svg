  <text x="663" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">48시간 내 게시</text>
  <rect x="613" y="248" width="100" height="20" fill="#9D174D" opacity="0.1"/>
  <text x="663" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#9D174D">품질 검수</text>

