  <text x="274" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#DB2777">AI 스코어링</text>

  <!-- Arrow -->
  <path d="M346 185 L368 185" stroke="#DB2777" stroke-width="2"/>
  <polygon points="368,180 378,185 368,190" fill="#DB2777"/>

