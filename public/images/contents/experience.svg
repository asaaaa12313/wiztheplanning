  <text x="450" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#BE185D">03</text>
  <text x="450" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#831843">방문 / 체험</text>
