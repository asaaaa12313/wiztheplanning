  <text x="450" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#BE185D">스케줄 관리</text>

  <!-- Arrow -->
  <path d="M522 185 L544 185" stroke="#BE185D" stroke-width="2"/>
  <polygon points="544,180 554,185 544,190" fill="#BE185D"/>

